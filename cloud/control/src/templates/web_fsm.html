<!DOCTYPE html>
<html>
<head>
    <title>FSM</title>
    <style>
        .wrap {
            position: relative;
            display: inline-block;
        }

        #video {
            display: block;
            width: 100%;
            background: #000;
        }

        #deadzone {
            position: absolute;
            left: 45%;
            top: 45%;
            width: 10%;
            height: 10%;
            border: 2px dashed #ffd400;
            background: rgba(255, 212, 0, 0.12);
            pointer-events: none;
            display: none;
        }

        #deadzone.on {
            display: block;
        }

        #status {
            position: absolute;
            top: 12px;
            left: 12px;
            margin: 0;
            z-index: 10;
            font-size: 24px;
            font-weight: 700;
            color: #ffd400;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.7);
        }

        .dz-label {
            position: absolute;
            left: 50%;
            top: 44%;
            transform: translate(-50%, -100%);
            background: rgba(0, 0, 0, 0.7);
            padding: 3px 6px;
            border-radius: 3px;
            font-size: 12px;
            color: #fff;
            pointer-events: none;
            display: none;
        }

        .dz-label.on {
            display: block;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div id="status">UNKNOWN</div>
        <img id="video" alt="FSM video" />
        <div id="deadzone"></div>
        <div class="dz-label" id="dzLabel">Deadzone ±5%</div>
    </div>

    <script>
        const video = document.getElementById('video');
        video.src = `http://${window.location.hostname}:5051/mjpeg_fsm`;

        async function refreshState() {
            try {
                const res = await fetch('/state');
                if (!res.ok) {
                    return;
                }
                const data = await res.json();
                const state = (data.state || 'unknown').toLowerCase();
                document.getElementById('status').textContent = state.toUpperCase();
                document.getElementById('deadzone').classList.toggle('on', state === 'follow');
                document.getElementById('dzLabel').classList.toggle('on', state === 'follow');
            } catch (e) {
                document.getElementById('status').textContent = 'UNKNOWN';
            }
        }

        refreshState();
        setInterval(refreshState, 500);
    </script>
</body>
</html>
