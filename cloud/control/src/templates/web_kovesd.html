<!DOCTYPE html>
<html>
<head>
    <title>Web Kovesd</title>
    <style>
        body { display: flex; justify-content: center; }
        .video-wrapper {
            width: 960px;
            height: 720px;
            border: 2px solid black;
        }
        .video-stream {
            width: 100%;
            height: 100%;
        }
        .deadzone-center {
            position: absolute;
            left: 45%;
            top: 45%;
            width: 10%;
            height: 10%;
            border: 2px dashed rgba(255, 215, 0, 0.95);
            background: rgba(255, 215, 0, 0.12);
            pointer-events: none;
        }
        .dz-label {
            position: absolute;
            left: 50%;
            top: 42%;
            transform: translate(-50%, -100%);
            background: rgba(255, 255, 255, 0.9);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            color: #222;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="video-wrapper">
        <img src="http://{{ host }}:5051/mjpeg_kovesd" class="video-stream" id="videoStream" />
        <div class="deadzone-center" id="dzCenter"></div>
        <div class="dz-label">Deadzone ±5%</div>
    </div>
</body>
</html>
